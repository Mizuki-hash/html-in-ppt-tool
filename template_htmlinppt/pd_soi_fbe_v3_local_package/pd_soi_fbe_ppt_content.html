<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PD-SOI FBE PPT Content Add-in</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #f4f7fb; }
    #fit {
      position: absolute;
      left: 0;
      top: 0;
      width: 1680px;
      height: 945px;
      transform-origin: 0 0;
      background: #f4f7fb;
      overflow: hidden;
    }
    iframe { width: 1680px; height: 945px; border: 0; display: block; background: #f4f7fb; }
  </style>
</head>
<body>
  <div id="fit">
    <iframe id="content" src="pd_soi_fbe_simulator_v3.html?dpr=1.35&amp;ppt=1&amp;v=20260514_charge_marks2" title="PD-SOI 交互式 FBE 物理过程模拟器"></iframe>
  </div>
  <script>
    const DESIGN_W = 1680;
    const DESIGN_H = 945;
    const fitBox = document.getElementById('fit');
    const content = document.getElementById('content');

    function resizeFixedViewport() {
      const scale = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
      const x = (window.innerWidth - DESIGN_W * scale) / 2;
      const y = (window.innerHeight - DESIGN_H * scale) / 2;
      fitBox.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }

    window.addEventListener('resize', resizeFixedViewport, { passive: true });
    window.addEventListener('message', event => {
      if (content.contentWindow) content.contentWindow.postMessage(event.data, '*');
    });
    resizeFixedViewport();
  </script>
</body>
</html>
